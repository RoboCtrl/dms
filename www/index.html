<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#121212" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>DMS — Data Matrix Scanner</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main id="app">
      <!-- Top: camera + freeze overlay -->
      <section id="camera-panel">
        <video id="video" playsinline muted></video>
        <canvas id="freeze" hidden></canvas>
        <canvas id="overlay" hidden></canvas>
        <div id="scan-content" hidden></div>
        <div id="camera-error" hidden></div>
        <div id="camera-off" hidden><span class="cam-off-icon"></span></div>
        <div id="reticle" hidden><i></i><i></i><i></i><i></i></div>
        <div id="tap-hint" hidden>Tap to continue scanning</div>
        <button id="camera-btn" class="cam-ctrl" aria-label="Toggle camera"></button>
        <button id="menu-btn" class="cam-ctrl" aria-label="Options"></button>
      </section>

      <!-- Bottom: scan history -->
      <section id="history" aria-label="Scan history"></section>

      <!-- Undo bar -->
      <footer id="bottom-bar" hidden>
        <button id="undo-btn">Undo delete</button>
      </footer>
    </main>

    <!-- Options overlay -->
    <div id="options" class="overlay" hidden>
      <div class="options-panel" role="dialog" aria-modal="true">
        <div class="options-header">
          <h2>Options</h2>
          <button id="options-close" aria-label="Close"></button>
        </div>

        <label class="opt-row">
          <span>Theme</span>
          <select id="opt-theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>

        <section class="opt-group">
          <h3>Scanner</h3>

          <label class="opt-row">
            <span>Camera viewport height</span>
            <input
              id="opt-cam-height"
              type="range"
              min="0"
              max="4"
              step="1"
              aria-label="Camera viewport height"
            />
          </label>

          <fieldset class="opt-freeze">
            <legend>Scanner freeze</legend>

            <label class="opt-freeze-row">
              <input type="radio" name="freeze-mode" value="timer" id="freeze-mode-timer" />
              <span>Continue after:</span>
              <input id="opt-freeze-timer" type="range" min="0" max="3" step="1"
                aria-label="Continue after duration" />
            </label>

            <label class="opt-freeze-row">
              <input type="radio" name="freeze-mode" value="tap" id="freeze-mode-tap" />
              <span>Tap to continue, delayed by</span>
              <input id="opt-freeze-tap" type="range" min="0" max="3" step="1"
                aria-label="Tap-to-continue delay" />
            </label>

            <label class="opt-freeze-row">
              <input type="radio" name="freeze-mode" value="auto" id="freeze-mode-auto" />
              <span>Automatic unfreeze, delayed by:</span>
              <input id="opt-freeze-auto" type="range" min="0" max="3" step="1"
                aria-label="Automatic unfreeze delay" />
            </label>
          </fieldset>
        </section>

        <section class="opt-group">
          <h3>List entries</h3>

          <label class="opt-row">
            <span>Hide duplicates</span>
            <input id="opt-hide-dup" type="checkbox" />
          </label>

          <fieldset class="opt-radios">
            <legend>Grouping mode</legend>

            <label class="opt-radio-row">
              <input type="radio" name="group-mode" value="full" id="group-mode-full" />
              <span>Only group full matches</span>
            </label>

            <label class="opt-radio-row">
              <input type="radio" name="group-mode" value="firstToken" id="group-mode-first-token" />
              <span>Group by first token</span>
            </label>

            <label class="opt-radio-row">
              <input type="radio" name="group-mode" value="firstSuffix" id="group-mode-first-suffix" />
              <span>Group on first token suffix</span>
            </label>

            <label class="opt-radio-row">
              <input type="radio" name="group-mode" value="secondToken" id="group-mode-second-token" />
              <span>Group on second token</span>
            </label>

            <label class="opt-radio-row">
              <input type="radio" name="group-mode" value="none" id="group-mode-none" />
              <span>Never group</span>
            </label>
          </fieldset>
        </section>

        <section class="opt-group">
          <h3>Database</h3>
          <p id="db-stats">0 entries &middot; 0 kB</p>
          <button id="clear-db-btn">Clear database</button>
        </section>

        <section class="opt-group">
          <h3>Catalog</h3>
          <p id="catalog-stats">0 entries</p>
          <button id="catalog-import-btn">Import catalogs</button>
          <button id="catalog-clear-btn">Clear catalog</button>
          <div id="catalog-files" hidden></div>
        </section>

        <section class="opt-group">
          <h3>About</h3>
          <p class="about-name">Data Matrix Scanner</p>
          <p><a href="https://github.com/RoboCtrl/dms" target="_blank" rel="noopener">https://github.com/RoboCtrl/dms</a></p>
        </section>
      </div>
    </div>

    <script src="vendor/zxing/zxing.min.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
